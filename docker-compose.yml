services:
  swclass-industry-api:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/python:3.13-slim-bookworm}
    image: swclass-industry-api:latest
    container_name: swclass-industry-api
    restart: unless-stopped
    environment:
      SWCLASS_API_TOKEN: ${SWCLASS_API_TOKEN:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${SWCLASS_API_PORT:-5000}:5000"
    volumes:
      - swclass-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  swclass-data:
